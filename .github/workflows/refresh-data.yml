name: Refresh State of Black in Blockchain data

on:
  # Monday 06:00 UTC (matches the existing anbachain.org cadence).
  schedule:
    - cron: "0 6 * * 1"
  # Manual trigger from the Actions tab.
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: data-pipeline/requirements.txt

      - name: Install dependencies
        run: pip install -r data-pipeline/requirements.txt

      - name: Build data
        working-directory: data-pipeline
        run: python build_data.py

      - name: Commit refreshed data
        run: |
          git config user.name  "anbachain-bot"
          git config user.email "bot@anbachain.org"
          git add public/data/
          if git diff --cached --quiet; then
            echo "No data changes."
            exit 0
          fi
          VERSION=$(python -c "import json; print(json.load(open('public/data/meta.json'))['dataset_version'])")
          git commit -m "data: weekly refresh → EC snapshot ${VERSION}"
          git push
